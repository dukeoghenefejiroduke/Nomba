<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing Lifecycle Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .status-pill { padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .status-past_due { background: #fff3cd; color: #856404; }
        .status-active { background: #d4edda; color: #155724; }
        button { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Operations Dashboard</h1>
        <div class="grid">
            <div class="card"><h3>Total Revenue</h3><div id="rev">-</div></div>
            <div class="card"><h3>Churn Risk Rate</h3><div id="risk">-</div></div>
            <div class="card"><h3>Recovery Rate</h3><div id="rec">-</div></div>
        </div>

        <div class="card">
            <h2>Active Subscriptions</h2>
            <table id="subsTable">
                <thead><tr><th>Sub ID</th><th>Status</th><th>Retry Count</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            // Mocking API call to metrics endpoint
            const res = await fetch('/api/analytics/metrics'); 
            const data = await res.json();
            document.getElementById('rev').innerText = `₦${data.totalRevenue}`;
            document.getElementById('risk').innerText = `${data.churnRiskRate}%`;
            document.getElementById('rec').innerText = `${data.autoRecoveryRate}%`;

            const subsRes = await fetch('/api/subscriptions');
            const subs = await subsRes.json();
            const tbody = document.querySelector('#subsTable tbody');
            tbody.innerHTML = subs.map(s => `<tr>
                <td>${s._id.slice(-6)}</td>
                <td><span class="status-pill status-${s.status}">${s.status}</span></td>
                <td>${s.dunningRetryCount || 0}</td>
                <td><button onclick="reconcile('${s._id}')">Audit & Reconcile</button></td>
            </tr>`).join('');
        }
        async function reconcile(subId) {
            alert('Reconciling ' + subId + '...');
            // Trigger reconciliation endpoint
        }
        loadDashboard();
    </script>
</body>
</html>
