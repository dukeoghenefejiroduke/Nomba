<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomba Billing Engine | Hackathon Demo</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h1, h2 { color: #1a1a1a; }
        input { display: block; width: 100%; box-sizing: border-box; margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .log-area { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 6px; font-family: 'Courier New', monospace; height: 150px; overflow-y: auto; }
        .nav { display: flex; gap: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Create Subscription</a>
            <a href="/dashboard.html">View Dashboard</a>
        </nav>
        <h1>Nomba Billing Engine</h1>
        
        <div class="card">
            <h2>Initialize Subscription</h2>
            <input type="text" id="userId" placeholder="User ID">
            <input type="text" id="token" placeholder="Token Key">
            <input type="number" id="amount" placeholder="Amount (NGN)">
            <button onclick="createSubscription()">Authorize & Start Billing</button>
        </div>

        <div class="card">
            <h2>System Logs</h2>
            <div id="logs" class="log-area">Ready to process...</div>
        </div>
    </div>
    <script>
        function log(msg) {
            const el = document.getElementById('logs');
            el.innerHTML += `<br>> ${msg}`;
            el.scrollTop = el.scrollHeight;
        }
        async function createSubscription() {
            const userId = document.getElementById('userId').value;
            const tokenKey = document.getElementById('token').value;
            const amount = document.getElementById('amount').value;
            log('Initiating transaction...');
            const res = await fetch('/api/subscriptions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-idempotency-key': Date.now().toString() },
                body: JSON.stringify({ userId, tokenKey, amount, billingCycle: 'monthly' })
            });
            const data = await res.json();
            log(JSON.stringify(data));
        }
    </script>
</body>
</html>
