<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nomba Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        .active { color: green; }
        .past_due { color: orange; }
        .canceled { color: red; }
    </style>
</head>
<body>
    <h1>Nomba Billing Dashboard</h1>
    <div class="card">
        <h3>Create Subscription</h3>
        <input type="text" id="userId" placeholder="User ID">
        <input type="text" id="token" placeholder="Token Key">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="createSubscription()">Create</button>
    </div>
    <div id="status"></div>
    <script>
        async function createSubscription() {
            const userId = document.getElementById('userId').value;
            const tokenKey = document.getElementById('token').value;
            const amount = document.getElementById('amount').value;
            const response = await fetch('/api/subscriptions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-idempotency-key': Date.now().toString() },
                body: JSON.stringify({ userId, tokenKey, amount, billingCycle: 'monthly' })
            });
            const data = await response.json();
            document.getElementById('status').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
