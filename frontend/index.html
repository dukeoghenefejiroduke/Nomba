<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nomba Billing Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Dependencies (Development for debugging) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <div id="root">Loading dashboard...</div>
    
    <script type="text/javascript">
        // Global error handler
        window.onerror = function(message, source, lineno, colno, error) {
            console.error(message, error);
            document.getElementById('root').innerHTML = 
                '<div style="color:white; padding:20px; background:#ef4444;">' +
                '<h3>Dashboard Error:</h3>' + message + 
                '</div>';
        };
    </script>
    
    <!-- App -->
    <script type="text/babel" data-presets="react" src="App.js"></script>
</body>
</html>
